server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: serve index.html for any client-side route
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API -> netzsim (strip the /api prefix)
    location /api/ {
        proxy_pass http://netzsim:8000/;
        proxy_set_header Host $host;
    }

    # WebSocket live stream
    location /ws {
        proxy_pass http://netzsim:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 1h;
    }
}
